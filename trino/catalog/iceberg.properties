# ═══════════════════════════════════════════════════════════════════════
# TRINO ICEBERG CATALOG
# ═══════════════════════════════════════════════════════════════════════
# IMPORTANT: This is Java .properties format, NOT YAML.
# - Comments MUST be on their own line (start with # or !)
# - Inline comments are NOT supported — everything after = is the value,
#   including any "# comment" text and trailing whitespace.
# - That's why we use full-line comments before each property below.

# Connector type
connector.name=iceberg

# Catalog backend: use the REST catalog spec, pointed at our iceberg-rest service.
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.warehouse=s3://streamscope/warehouse

# Enable the native S3 filesystem (modern Trino; replaces the legacy hadoop-S3).
# Was fs.native-s3.enabled in older Trino; renamed to fs.s3.enabled in 470+.
fs.s3.enabled=true

# S3 endpoint override — point at MinIO instead of AWS.
s3.endpoint=http://minio:9000

# Region is required by the AWS SDK even though MinIO ignores the actual value.
s3.region=us-east-1

# MinIO requires path-style URLs (bucket name in the path, not as a subdomain).
s3.path-style-access=true

# Credentials.
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
